syntax = "proto3";

package vectorization;

service VectorizationService {
  rpc CreateVstore (CreateVstoreRequest) returns (VstoreOperationResponse);
  rpc DeleteVstore (DeleteVstoreRequest) returns (VstoreOperationResponse);
  rpc CreateEmbeddings (CreateEmbeddingsRequest) returns (CreateEmbeddingsResponse);
  rpc SearchEmbeddings (SearchEmbeddingsRequest) returns (SearchEmbeddingsResponse);
}

message CreateVstoreRequest {
  string access_token = 1;
}

message DeleteVstoreRequest {
  string access_token = 1;
  string vstore_uuid = 2;
}

message VstoreOperationPayload {
  string vstore_uuid = 1;
  string collection = 2;
  string path = 3;
}

message VstoreOperationResponse {
  bool success = 1;
  string message = 2;
  VstoreOperationPayload payload = 3;
}

message EmbedDocument {
  string name = 1;
  string source = 2;
  bytes content = 3;
  string storage_file_id = 4;
}

message CreateEmbeddingsRequest {
  string access_token = 1;
  string vstore_uuid = 2;
  repeated EmbedDocument documents = 3;
  string collection_name = 4;
}

message CreateEmbeddingsResponse {
  optional bool success = 1;
  optional uint64 directory_size = 2;
  optional uint32 vectorized_chunks = 3;
  optional string error = 4;
}

message SearchEmbeddingsRequest {
  string access_token = 1;
  string vstore_uuid = 2;
  string query = 3;
  uint32 top_k = 4;
  string collection_name = 5;
}

message SearchResultItem {
  string id = 1;
  string document = 2;
  string metadata_json = 3;
  double distance = 4;
}

message SearchEmbeddingsResponse {
  bool success = 1;
  string message = 2;
  repeated SearchResultItem items = 3;
  string error = 4;
}
